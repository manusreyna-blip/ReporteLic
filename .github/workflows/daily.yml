name: radar-diario

on:
  schedule:
    # 07:30 ART (10:30 UTC), lunes a sábado
    - cron: "30 10 * * 1-6"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencias
        run: pip install -r requirements.txt

      - name: Correr el radar
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m collector.main

      - name: Insertar URL de la página en el email
        run: |
          PAGE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          sed -i "s|__PAGE_URL__|$PAGE_URL|g" docs/email.html
          echo "TODAY=$(TZ=America/Argentina/Buenos_Aires date +%d/%m/%Y)" >> "$GITHUB_ENV"

      - name: Commit del reporte
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add latest.json archive/ docs/
          git diff --cached --quiet || git commit -m "radar: reporte $(date -u +%F)"
          git push

      - name: Enviar email diario
        if: ${{ always() }}
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Radar Licitaciones Tech AR — ${{ env.TODAY }}"
          to: ${{ secrets.MAIL_TO }}
          from: Radar Licitaciones <${{ secrets.MAIL_USERNAME }}>
          html_body: file://docs/email.html
