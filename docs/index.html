<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radar de Licitaciones Tech — Argentina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..100,400..800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10243E; --paper:#F6F7F9; --surface:#FFFFFF; --line:#E3E7EE;
    --cobalt:#1B5BFF; --green:#0E7A3D; --amber:#B07000; --gray:#5B6472;
    --radius:10px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
       font:15px/1.5 "Archivo",system-ui,sans-serif}
  .mono{font-family:"IBM Plex Mono",monospace}

  header{background:var(--ink);color:#fff;padding:22px clamp(16px,4vw,40px)}
  header h1{margin:0;font-size:clamp(19px,2.6vw,26px);font-weight:800;
            font-stretch:80%;letter-spacing:.2px}
  header h1 span{color:#7FA4FF}
  .meta{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-top:6px;
        font-size:12.5px;color:#9DB4D0}
  .src{display:inline-flex;align-items:center;gap:5px}
  .dot{width:7px;height:7px;border-radius:50%;background:#37C871;display:inline-block}
  .dot.bad{background:#FF6B6B}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
         gap:1px;background:var(--line);border-bottom:1px solid var(--line)}
  .stat{background:var(--surface);padding:14px clamp(16px,4vw,40px)}
  .stat b{display:block;font-size:26px;font-weight:800;font-stretch:85%}
  .stat small{color:var(--gray);font-size:12px;text-transform:uppercase;
              letter-spacing:.6px}

  .controls{display:flex;flex-wrap:wrap;gap:10px;
            padding:16px clamp(16px,4vw,40px) 4px}
  .controls input,.controls select{
    font:inherit;font-size:13.5px;padding:8px 12px;border:1px solid var(--line);
    border-radius:8px;background:var(--surface);color:var(--ink)}
  .controls input{flex:1;min-width:200px}
  .controls :focus-visible{outline:2px solid var(--cobalt);outline-offset:1px}

  main{padding:10px clamp(16px,4vw,40px) 48px;max-width:1080px}
  .tender{display:grid;grid-template-columns:86px 1fr 150px;gap:16px;
          background:var(--surface);border:1px solid var(--line);
          border-radius:var(--radius);padding:16px 18px;margin-top:12px}
  .prob{text-align:center}
  .prob b{font-family:"IBM Plex Mono",monospace;font-size:30px;font-weight:600;
          display:block;line-height:1}
  .gauge{height:5px;background:var(--line);border-radius:3px;margin-top:8px;
         overflow:hidden}
  .gauge i{display:block;height:100%;border-radius:3px}
  .prob small{display:block;margin-top:6px;font-size:10.5px;color:var(--gray);
              text-transform:uppercase;letter-spacing:.5px}
  .p-hi b{color:var(--green)} .p-hi .gauge i{background:var(--green)}
  .p-mid b{color:var(--amber)} .p-mid .gauge i{background:var(--amber)}
  .p-lo b{color:var(--gray)} .p-lo .gauge i{background:var(--gray)}

  .body h2{margin:0 0 4px;font-size:16px;font-weight:700;line-height:1.35}
  .body h2 a{color:inherit;text-decoration:none}
  .body h2 a:hover{color:var(--cobalt);text-decoration:underline}
  .agency{color:var(--gray);font-size:13px}
  .pid{font-size:11.5px;color:var(--gray)}
  .chips{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:11.5px;font-weight:600;color:var(--cobalt);
        background:#EDF2FF;border-radius:999px;padding:3px 9px}
  .rationale{margin:8px 0 0;font-size:13px;color:#33415C}

  .when{text-align:right;font-size:13px}
  .when .mono{font-size:14px}
  .badge{display:inline-block;margin-top:6px;font-size:11px;font-weight:700;
         padding:3px 8px;border-radius:6px}
  .badge.urgent{background:#FFF3D6;color:var(--amber)}
  .badge.ok{background:#EAF6EE;color:var(--green)}

  .empty,.error{background:var(--surface);border:1px dashed var(--line);
        border-radius:var(--radius);padding:36px;text-align:center;
        color:var(--gray);margin-top:16px}
  footer{padding:0 clamp(16px,4vw,40px) 40px;color:var(--gray);font-size:12px}
  footer a{color:var(--cobalt)}

  @media (max-width:680px){
    .tender{grid-template-columns:64px 1fr}
    .when{grid-column:2;text-align:left;display:flex;gap:10px;align-items:center}
    .prob b{font-size:24px}
  }
  @media (prefers-reduced-motion:no-preference){
    .tender{animation:rise .25s ease both}
    @keyframes rise{from{opacity:0;transform:translateY(4px)}}
  }
</style>
</head>
<body>
<header>
  <h1>Radar de Licitaciones Tech <span>/ Argentina</span></h1>
  <div class="meta" id="meta">Cargando reporte…</div>
</header>

<div class="stats" id="stats" hidden>
  <div class="stat"><b id="stTotal">–</b><small>activas detectadas</small></div>
  <div class="stat"><b id="stHot">–</b><small>probabilidad ≥ 65</small></div>
  <div class="stat"><b id="stUrgent">–</b><small>abren en ≤ 10 días</small></div>
  <div class="stat"><b id="stSources">–</b><small>fuentes ok</small></div>
</div>

<div class="controls" id="controls" hidden>
  <input id="q" type="search" placeholder="Buscar por título, organismo o producto…"
         aria-label="Buscar licitaciones">
  <select id="minProb" aria-label="Probabilidad mínima">
    <option value="0">Toda probabilidad</option>
    <option value="40">Prob. ≥ 40</option>
    <option value="65" selected>Prob. ≥ 65</option>
    <option value="85">Prob. ≥ 85</option>
  </select>
  <select id="srcSel" aria-label="Fuente"><option value="">Todas las fuentes</option></select>
</div>

<main id="list"></main>

<footer id="foot" hidden>
  Resumen del día: <span id="summary"></span> ·
  <a id="jsonLink" href="./latest.json">latest.json</a>
</footer>

<script>
const $=s=>document.querySelector(s);
let DATA=null;

function daysLeft(iso){
  if(!iso) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  return Math.round((new Date(iso+"T00:00:00")-today)/864e5);
}
function fmtDate(iso){
  if(!iso) return "N/D";
  const [y,m,d]=iso.split("-");
  return `${d}/${m}/${y}`;
}
function probClass(p){return p>=65?"p-hi":p>=40?"p-mid":"p-lo"}

function render(){
  const q=($("#q").value||"").toLowerCase();
  const min=+$("#minProb").value;
  const src=$("#srcSel").value;
  const list=$("#list"); list.innerHTML="";
  const items=DATA.tenders.filter(t=>{
    if(t.probability<min||((src&&t.source!==src))) return false;
    if(!q) return true;
    return (t.title+" "+t.agency+" "+(t.products||[]).join(" "))
           .toLowerCase().includes(q);
  });
  if(!items.length){
    list.innerHTML=`<div class="empty">Ningún resultado con estos filtros.
      Bajá la probabilidad mínima o limpiá la búsqueda.</div>`;
    return;
  }
  for(const t of items){
    const dl=daysLeft(t.opening_date);
    const badge=dl==null?"":dl<=10
      ?`<span class="badge urgent">abre en ${dl} día${dl===1?"":"s"}</span>`
      :`<span class="badge ok">abre en ${dl} días</span>`;
    const el=document.createElement("article");
    el.className="tender";
    el.innerHTML=`
      <div class="prob ${probClass(t.probability)}">
        <b>${t.probability}</b>
        <div class="gauge"><i style="width:${t.probability}%"></i></div>
        <small>prob.</small>
      </div>
      <div class="body">
        <h2><a href="${t.link}" target="_blank" rel="noopener">${t.title}</a></h2>
        <div class="agency">${t.agency} · ${t.source}
          ${t.process_id?`· <span class="pid mono">${t.process_id}</span>`:""}</div>
        <div class="chips">${(t.products||[]).map(p=>`<span class="chip">${p}</span>`).join("")}</div>
        ${t.rationale?`<p class="rationale">${t.rationale}</p>`:""}
      </div>
      <div class="when">
        <span class="mono">${fmtDate(t.opening_date)}</span><br>${badge}
      </div>`;
    list.appendChild(el);
  }
}

fetch("./latest.json",{cache:"no-store"}).then(r=>{
  if(!r.ok) throw new Error(r.status);
  return r.json();
}).then(data=>{
  DATA=data;
  const srcs=(data.sources_ok||[]).map(s=>`<span class="src"><i class="dot"></i>${s}</span>`)
    .concat((data.sources_failed||[]).map(s=>`<span class="src"><i class="dot bad"></i>${s}</span>`));
  $("#meta").innerHTML=`<span>${data.date}</span>${srcs.join("")}`;
  const hot=data.tenders.filter(t=>t.probability>=65).length;
  const urgent=data.tenders.filter(t=>{const d=daysLeft(t.opening_date);
    return d!=null&&d<=10}).length;
  $("#stTotal").textContent=data.tenders.length;
  $("#stHot").textContent=hot;
  $("#stUrgent").textContent=urgent;
  $("#stSources").textContent=(data.sources_ok||[]).length;
  $("#summary").textContent=data.summary;
  const sel=$("#srcSel");
  [...new Set(data.tenders.map(t=>t.source))].forEach(s=>{
    const o=document.createElement("option");o.value=o.textContent=s;sel.appendChild(o);
  });
  $("#stats").hidden=$("#controls").hidden=$("#foot").hidden=false;
  ["q","minProb","srcSel"].forEach(id=>$("#"+id).addEventListener("input",render));
  if(!data.tenders.some(t=>t.probability>=65)) $("#minProb").value="0";
  render();
}).catch(()=>{
  $("#meta").textContent="";
  $("#list").innerHTML=`<div class="error">Todavía no hay reporte generado.
    Corré el workflow «radar-diario» desde la pestaña Actions del repo.</div>`;
});
</script>
</body>
</html>
